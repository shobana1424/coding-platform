<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>தமிழ் Code Master</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Devicon logos -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background: radial-gradient(circle at top left,#5f2cff,#0f2027,#111);
      color:white;
      overflow-x:hidden;
    }

    /* NAVBAR */
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 50px;
    }

    .logo{
      font-size:24px;
      font-weight:700;
      background:linear-gradient(90deg,#00ffd5,#00a8ff);
      -webkit-background-clip: text;
      
      -webkit-text-fill-color:transparent;
    }

    .search{
      padding:10px 18px;
      border-radius:25px;
      border:none;
      outline:none;
      width:250px;
    }

    /* HERO */
    .hero{
      text-align:center;
      padding:50px 20px;
    }

    .hero h1{
      font-size:44px;
      font-weight:700;
      margin-bottom:10px;
    }

    .hero span{
      color:#00ffd5;
    }

    .hero p{
      opacity:.8;
    }

    /* TABS */
    .tabs{
      text-align:center;
      margin:20px 0 40px;
    }

    .tabs button{
      padding:10px 22px;
      margin:6px;
      border-radius:25px;
      border:none;
      background:rgba(255,255,255,0.15);
      color:white;
      cursor:pointer;
      transition:.3s;
    }

    .tabs button.active,
    .tabs button:hover{
      background:#00ffd5;
      color:black;
    }

    /* GRID */
    .grid{
      padding:0 50px 60px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:30px;
    }

    /* CARD (glass neon) */
    .card{
      background:rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border-radius:25px;
      padding:35px 25px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
      transition:.35s;
      position:relative;
    }

    .card:hover{
      transform:translateY(-10px) scale(1.05);
      box-shadow:0 0 30px rgba(0,255,213,0.5);
    }

    .icon{
      font-size:70px;
      margin-bottom:18px;
    }

    .card h3{
      margin-bottom:10px;
      font-size:20px;
    }

    .card p{
      font-size:13px;
      opacity:.7;
      margin-bottom:18px;
    }

    /* BUTTONS */
    .btns a{
      text-decoration:none;
      padding:9px 15px;
      border-radius:10px;
      margin:4px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
    }

    .docs{
      background:#00ffd5;
      color:black;
    }

    .yt{
      background:#ff3d5a;
      color:white;
    }

    footer{
      text-align:center;
      padding:25px;
      opacity:.6;
    }

    /* MOBILE */
    @media(max-width:600px){
      .nav{flex-direction:column;gap:15px;}
      .search{width:90%;}
      .hero h1{font-size:30px;}
    }
  </style>
</head>


<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">🚀 shobs coding port</div>
  <input id="search" class="search" placeholder="Search course...">
</div>

<!-- HERO -->
<div class="hero">
  <h1>Learn <span>Programming</span> in Tamil</h1>
  <p>Languages • Frameworks • Tools — all in one portal</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('languages', this)">Languages</button>
  <button class="tab" onclick="showTab('frameworks', this)">Frameworks</button>
  <button class="tab" onclick="showTab('tools', this)">Tools</button>
</div>

<!-- CARDS -->
<div id="content" class="grid"></div>

<footer>
  Made with ❤️ 
</footer>


<script>

const data={
  languages:[
    {title:"HTML",icon:"devicon-html5-plain colored"},
    {title:"CSS",icon:"devicon-css3-plain colored"},
    {title:"JavaScript",icon:"devicon-javascript-plain colored"},
    {title:"Python",icon:"devicon-python-plain colored"}
  ],
  frameworks:[
    {title:"React",icon:"devicon-react-original colored"},
    {title:"Django",icon:"devicon-django-plain colored"}
  ],
  tools:[
    {title:"Git",icon:"devicon-git-plain colored"},
    {title:"VS Code",icon:"devicon-vscode-plain colored"}
  ]
};

const links={
  "HTML":"https://developer.mozilla.org/en-US/docs/Web/HTML",
  "CSS":"https://developer.mozilla.org/en-US/docs/Web/CSS",
  "JavaScript":"https://developer.mozilla.org/en-US/docs/Web/JavaScript",
  "Python":"https://docs.python.org/3/",
  "React":"https://react.dev",
  "Django":"https://docs.djangoproject.com/",
  "Git":"https://git-scm.com/docs",
  "VS Code":"https://code.visualstudio.com/docs"
};

let current="languages";
const container=document.getElementById("content");

function render(list){
  container.innerHTML="";
  list.forEach(item=>{
    container.innerHTML+=`
      <div class="card">
        <i class="${item.icon} icon"></i>
        <h3>${item.title}</h3>
        <p>Learn ${item.title} easily in Tamil</p>
        <div class="btns">
          <a class="docs" href="${links[item.title]}" target="_blank">Docs</a>
          <a class="yt" href="https://youtube.com/results?search_query=${item.title}+tutorial+tamil" target="_blank">YouTube</a>
        </div>
      </div>
    `;
  });
}

function showTab(tab,btn){
  current=tab;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render(data[tab]);
}

document.getElementById("search").addEventListener("input",function(){
  const val=this.value.toLowerCase();
  const filtered=data[current].filter(x=>x.title.toLowerCase().includes(val));
  render(filtered);
});

render(data.languages);

</script>

</body>
</html>
